<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="manifest" href="manifest.json">
    <title>Gold Rush: The Debtor's Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Status Bar -->
        <header id="status-bar" role="status">
            <div class="stat">Gold: <span id="gold-val">1500</span></div>
            <div class="stat">HP: <span id="hp-val">18/18</span></div>
            <div class="stat">Debt: <span id="debt-val">5000</span></div>
            <div class="stat" id="facing-display">Facing: North</div>
        </header>

        <main id="ui-layout">
            <!-- Left Panel: Movement & Navigation -->
            <section id="movement-panel" aria-label="Movement Controls">
                <div class="control-group">
                    <button id="btn-up" aria-label="Move Forward">Forward</button>
                    <div class="rotation-controls">
                        <button id="btn-left" aria-label="Turn Left">Turn Left</button>
                        <button id="btn-right" aria-label="Turn Right">Turn Right</button>
                    </div>
                    <button id="btn-down" aria-label="Step Back">Back</button>
                </div>
                <button id="btn-scan" class="utility-btn" aria-label="Auto-Scan Surroundings">Scan</button>
            </section>

            <!-- Center: Visual Viewport (Placeholder) -->
            <section id="viewport" aria-hidden="true">
                <canvas id="game-canvas"></canvas>
                <div id="visual-overlay"></div>
            </section>

            <!-- Right Panel: Actions -->
            <section id="action-panel" aria-label="Action Controls">
                <button id="btn-attack" class="action-btn" aria-label="Attack">Attack</button>
                <button id="btn-interact" class="action-btn" aria-label="Interact">Interact</button>
                <button id="btn-inventory" class="utility-btn" aria-label="Inventory">Inventory</button>
            </section>
        </main>

        <!-- ARIA Live Log -->
        <div id="game-log" role="log" aria-live="polite" aria-relevant="additions">
            Welcome to the depths, Rogue. Escaping is the only way to pay your debt.
        </div>
    </div>

    <script src="gold-rush-core.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
